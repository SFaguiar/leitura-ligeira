<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Leitura Ligeira</title>
<link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
<header class="topbar">
    <h1 class="brand">Leitura Ligeira</h1>
    <div class="topbar-actions">
        <span id="current-user-name" class="current-user-name" hidden></span>
        <button id="logout-btn" class="btn" title="Sair" hidden>Sair</button>
        <button id="theme-toggle" class="icon-btn" title="Alternar tema">🌙</button>
    </div>
</header>

<main id="login-view" class="view">
    <h2>Quem está lendo?</h2>
    <ul id="profile-list" class="profile-list"></ul>
    <button id="new-profile-btn" class="btn btn-primary">+ Novo perfil</button>
</main>

<div id="login-modal" class="modal" hidden>
    <div class="modal-card">
        <h2 id="login-modal-name">Entrar</h2>
        <label for="login-password">Senha</label>
        <input id="login-password" type="password" placeholder="Sua senha" />
        <p id="login-error" class="error-text" hidden></p>
        <div class="modal-actions">
            <button id="login-cancel-btn" class="btn">Cancelar</button>
            <button id="login-submit-btn" class="btn btn-primary">Entrar</button>
        </div>
    </div>
</div>

<div id="new-profile-modal" class="modal" hidden>
    <div class="modal-card">
        <h2>Novo perfil</h2>
        <label for="new-profile-name">Nome</label>
        <input id="new-profile-name" type="text" placeholder="Seu nome" />
        <label for="new-profile-password">Senha</label>
        <input id="new-profile-password" type="password" placeholder="Escolha uma senha" />
        <p id="new-profile-error" class="error-text" hidden></p>
        <div class="modal-actions">
            <button id="new-profile-cancel-btn" class="btn">Cancelar</button>
            <button id="new-profile-submit-btn" class="btn btn-primary">Criar perfil</button>
        </div>
    </div>
</div>

<main id="library-view" class="view" hidden>
    <div class="library-actions">
        <button id="new-doc-btn" class="btn btn-primary">+ Novo texto</button>
    </div>
    <ul id="document-list" class="document-list"></ul>
    <p id="library-empty" class="empty-hint" hidden>Nenhum texto ainda. Cole um texto para começar.</p>
    <details id="abandoned-section" class="abandoned-section" hidden>
        <summary id="abandoned-summary">Abandonados</summary>
        <ul id="abandoned-list" class="document-list"></ul>
    </details>
</main>

<div id="abandoned-modal" class="modal" hidden>
    <div class="modal-card">
        <h2>Retomar este documento?</h2>
        <p id="abandoned-modal-title" class="modal-subtitle"></p>
        <div class="modal-actions modal-actions-stack">
            <button id="abandoned-resume-btn" class="btn btn-primary">Continuar lendo</button>
            <button id="abandoned-wishlist-btn" class="btn">Quero ler</button>
            <button id="abandoned-keep-btn" class="btn">Manter abandonado (só explorar)</button>
        </div>
    </div>
</div>

<div id="new-doc-modal" class="modal" hidden>
    <div class="modal-card">
        <h2>Colar texto</h2>
        <label for="doc-title">Título</label>
        <input id="doc-title" type="text" placeholder="Ex: Artigo sobre X" />
        <label for="doc-text">Texto</label>
        <textarea id="doc-text" rows="10" placeholder="Cole o texto aqui..."></textarea>
        <label class="checkbox-row">
            <input id="doc-private" type="checkbox" />
            Documento privado (só eu vejo)
        </label>
        <div class="modal-actions">
            <button id="cancel-doc-btn" class="btn">Cancelar</button>
            <button id="save-doc-btn" class="btn btn-primary">Salvar e ler</button>
        </div>
    </div>
</div>

<main id="reader-view" class="view" hidden>
    <div class="reader-topbar">
        <button id="back-btn" class="icon-btn" title="Voltar à biblioteca">←</button>
        <span id="reader-title" class="reader-title"></span>
        <div class="mode-switch">
            <button id="mode-focus-btn" class="mode-btn active" data-mode="focus">Foco</button>
            <button id="mode-flow-btn" class="mode-btn" data-mode="flow">Fluxo</button>
        </div>
    </div>

    <div id="rsvp-stage" class="rsvp-stage" title="Toque para play/pause">
        <div id="rsvp-display" class="rsvp-display">Pronto</div>
    </div>

    <div id="flow-region" class="flow-region" hidden>
        <div id="flow-content" class="flow-content"></div>
        <button id="flow-back-to-position" class="flow-back-btn" hidden>↓ Voltar pra posição atual</button>
    </div>

    <div id="scrubber" class="scrubber">
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div id="paragraph-marks" class="paragraph-marks"></div>
    </div>
    <div id="reading-progress-info" class="reading-progress-info"></div>

    <div class="controls">
        <div class="transport">
            <button id="rewind-btn" class="icon-btn" title="Voltar ao início da frase">⏮</button>
            <button id="play-pause-btn" class="icon-btn play-btn" title="Play/Pause">▶</button>
            <button id="forward-btn" class="icon-btn" title="Avançar para a próxima frase">⏭</button>
        </div>

        <div class="sliders">
            <div class="slider-row">
                <label for="wpm-slider">WPM: <span id="wpm-value">300</span></label>
                <input id="wpm-slider" type="range" min="100" max="1000" step="10" value="300" />
            </div>
            <div class="slider-row">
                <label for="chunk-slider">Palavras por vez: <span id="chunk-value">1</span></label>
                <input id="chunk-slider" type="range" min="1" max="4" step="1" value="1" />
            </div>
            <div class="slider-row">
                <label for="font-slider">Tamanho da fonte: <span id="font-value">48</span>px</label>
                <input id="font-slider" type="range" min="24" max="96" step="2" value="48" />
            </div>
            <div id="orp-row" class="slider-row toggle-row">
                <label for="orp-toggle">Destaque ORP (letra-âncora)</label>
                <button id="orp-toggle" class="icon-btn" title="Ativar/desativar ORP">Desligado</button>
            </div>
            <div id="nav-snap-back-row" class="slider-row toggle-row" hidden>
                <label for="nav-snap-back-toggle">Voltar ao Foco ao clicar numa palavra</label>
                <button id="nav-snap-back-toggle" class="icon-btn" title="Ao clicar numa palavra no Fluxo, volta pro Foco">Desligado</button>
            </div>
            <div class="slider-row toggle-row">
                <label for="nav-pause-switch-toggle">Pausar ao trocar de modo</label>
                <button id="nav-pause-switch-toggle" class="icon-btn" title="Pausar a leitura automaticamente ao trocar entre Foco e Fluxo">Desligado</button>
            </div>
        </div>
    </div>
</main>

<script type="module" src="/static/js/app.js"></script>
</body>
</html>
