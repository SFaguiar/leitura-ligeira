<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Leitura Ligeira</title>
<link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
<header class="topbar">
    <h1 class="brand">Leitura Ligeira</h1>
    <div class="topbar-actions">
        <span id="current-user-name" class="current-user-name" hidden></span>
        <button id="logout-btn" class="btn" title="Sair" hidden>Sair</button>
        <button id="theme-toggle" class="icon-btn" title="Alternar tema">🌙</button>
    </div>
</header>

<main id="login-view" class="view">
    <h2>Quem está lendo?</h2>
    <ul id="profile-list" class="profile-list"></ul>
    <button id="new-profile-btn" class="btn btn-primary">+ Novo perfil</button>
</main>

<div id="login-modal" class="modal" hidden>
    <div class="modal-card">
        <h2 id="login-modal-name">Entrar</h2>
        <label for="login-password">Senha</label>
        <input id="login-password" type="password" placeholder="Sua senha" />
        <p id="login-error" class="error-text" hidden></p>
        <div class="modal-actions">
            <button id="login-cancel-btn" class="btn">Cancelar</button>
            <button id="login-submit-btn" class="btn btn-primary">Entrar</button>
        </div>
    </div>
</div>

<div id="new-profile-modal" class="modal" hidden>
    <div class="modal-card">
        <h2>Novo perfil</h2>
        <label for="new-profile-name">Nome</label>
        <input id="new-profile-name" type="text" placeholder="Seu nome" />
        <label for="new-profile-password">Senha</label>
        <input id="new-profile-password" type="password" placeholder="Escolha uma senha" />
        <p id="new-profile-error" class="error-text" hidden></p>
        <div class="modal-actions">
            <button id="new-profile-cancel-btn" class="btn">Cancelar</button>
            <button id="new-profile-submit-btn" class="btn btn-primary">Criar perfil</button>
        </div>
    </div>
</div>

<main id="library-view" class="view" hidden>
    <div class="library-actions">
        <button id="new-doc-btn" class="btn btn-primary">+ Novo texto</button>
    </div>
    <div class="library-toolbar" role="search" aria-label="Buscar e filtrar biblioteca">
        <input id="library-search" class="library-search" type="search" placeholder="Buscar por título ou conteúdo..." aria-label="Buscar por título ou conteúdo" autocomplete="off" />
        <select id="library-collection-filter" class="library-collection-filter" aria-label="Filtrar por coleção">
            <option value="">Todas as coleções</option>
        </select>
    </div>
    <div class="mode-switch shelf-tabs" role="tablist" aria-label="Prateleiras da biblioteca">
        <button type="button" class="mode-btn active" role="tab" aria-selected="true" data-shelf="all">Todos</button>
        <button type="button" class="mode-btn" role="tab" aria-selected="false" tabindex="-1" data-shelf="quero_ler">Quero ler</button>
        <button type="button" class="mode-btn" role="tab" aria-selected="false" tabindex="-1" data-shelf="lendo">Lendo</button>
        <button type="button" class="mode-btn" role="tab" aria-selected="false" tabindex="-1" data-shelf="lido">Lido</button>
        <button type="button" class="mode-btn" role="tab" aria-selected="false" tabindex="-1" data-shelf="abandonado">Abandonado</button>
    </div>
    <ul id="document-list" class="document-list" aria-live="polite"></ul>
    <p id="library-empty" class="empty-hint" hidden>Nenhum texto ainda. Cole um texto para começar.</p>
</main>

<div id="abandoned-modal" class="modal" hidden>
    <div class="modal-card">
        <h2>Retomar este documento?</h2>
        <p id="abandoned-modal-title" class="modal-subtitle"></p>
        <div class="modal-actions modal-actions-stack">
            <button id="abandoned-resume-btn" class="btn btn-primary">Continuar lendo</button>
            <button id="abandoned-wishlist-btn" class="btn">Quero ler</button>
            <button id="abandoned-keep-btn" class="btn">Manter abandonado (só explorar)</button>
        </div>
    </div>
</div>

<div id="edit-doc-modal" class="modal" hidden>
    <div class="modal-card">
        <h2>Editar documento</h2>
        <label for="edit-doc-title">Título</label>
        <input id="edit-doc-title" type="text" placeholder="Título" />
        <label for="edit-doc-collection">Coleção (opcional)</label>
        <input id="edit-doc-collection" type="text" placeholder="Ex: Ficção, Trabalho..." list="edit-doc-collection-list" />
        <datalist id="edit-doc-collection-list"></datalist>
        <p id="edit-doc-error" class="error-text" hidden></p>
        <div class="modal-actions">
            <button id="edit-doc-cancel-btn" class="btn">Cancelar</button>
            <button id="edit-doc-save-btn" class="btn btn-primary">Salvar</button>
        </div>
    </div>
</div>

<div id="new-doc-modal" class="modal" hidden>
    <div class="modal-card">
        <h2>Novo texto</h2>
        <div class="mode-switch doc-tab-row">
            <button id="doc-tab-paste-btn" class="mode-btn active" data-tab="paste">Colar texto</button>
            <button id="doc-tab-file-btn" class="mode-btn" data-tab="file">Arquivo</button>
            <button id="doc-tab-url-btn" class="mode-btn" data-tab="url">URL</button>
        </div>

        <div id="doc-tab-paste" class="doc-tab-panel">
            <label for="doc-title">Título</label>
            <input id="doc-title" type="text" placeholder="Ex: Artigo sobre X" />
            <label for="doc-text">Texto</label>
            <textarea id="doc-text" rows="10" placeholder="Cole o texto aqui..."></textarea>
        </div>

        <div id="doc-tab-file" class="doc-tab-panel" hidden>
            <label for="doc-file-title">Título (opcional)</label>
            <input id="doc-file-title" type="text" placeholder="Usa o nome do arquivo se vazio" />
            <label for="doc-file-input">Arquivo — PDF, EPUB ou TXT (máx. 50MB)</label>
            <input id="doc-file-input" type="file" accept=".pdf,.epub,.txt" />
        </div>

        <div id="doc-tab-url" class="doc-tab-panel" hidden>
            <label for="doc-url-title">Título (opcional)</label>
            <input id="doc-url-title" type="text" placeholder="Usa o título da página se vazio" />
            <label for="doc-url-input">URL</label>
            <input id="doc-url-input" type="url" placeholder="https://..." />
        </div>

        <label class="checkbox-row">
            <input id="doc-private" type="checkbox" />
            Documento privado (só eu vejo)
        </label>
        <p id="doc-error" class="error-text" hidden></p>
        <div class="modal-actions">
            <button id="cancel-doc-btn" class="btn">Cancelar</button>
            <button id="save-doc-btn" class="btn btn-primary">Salvar e ler</button>
        </div>
    </div>
</div>

<main id="reader-view" class="view" hidden>
    <div class="reader-topbar">
        <button id="back-btn" class="icon-btn" title="Voltar à biblioteca">←</button>
        <div class="toc-wrapper">
            <button id="toc-btn" class="icon-btn" title="Capítulos" hidden>≡</button>
            <div id="toc-dropdown" class="toc-dropdown" hidden>
                <ul id="toc-list" class="toc-list"></ul>
            </div>
        </div>
        <span id="reader-title" class="reader-title"></span>
        <div class="mode-switch">
            <button id="mode-focus-btn" class="mode-btn active" data-mode="focus">Foco</button>
            <button id="mode-flow-btn" class="mode-btn" data-mode="flow">Fluxo</button>
        </div>
    </div>

    <div id="rsvp-stage" class="rsvp-stage" title="Toque para play/pause">
        <div id="rsvp-display" class="rsvp-display">Pronto</div>
    </div>

    <div id="flow-region" class="flow-region" hidden>
        <div id="flow-content" class="flow-content"></div>
        <button id="flow-back-to-position" class="flow-back-btn" hidden>↓ Voltar pra posição atual</button>
    </div>

    <div id="scrubber" class="scrubber">
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div id="paragraph-marks" class="paragraph-marks"></div>
    </div>
    <div id="reading-progress-info" class="reading-progress-info"></div>

    <div class="controls">
        <div class="transport">
            <button id="rewind-btn" class="icon-btn" title="Voltar ao início da frase">⏮</button>
            <button id="play-pause-btn" class="icon-btn play-btn" title="Play/Pause">▶</button>
            <button id="forward-btn" class="icon-btn" title="Avançar para a próxima frase">⏭</button>
        </div>

        <div class="tts-toolbar">
            <button id="tts-toggle" class="btn tts-toggle-btn" type="button" aria-pressed="false" aria-controls="tts-settings">
                <span aria-hidden="true">🔊</span>
                <span id="tts-toggle-label">Ativar Narrador</span>
            </button>
            <p id="tts-status" class="tts-status" role="status" aria-live="polite" hidden></p>
        </div>

        <div class="sliders">
            <div id="wpm-row" class="slider-row">
                <label for="wpm-slider">WPM: <span id="wpm-value">300</span></label>
                <input id="wpm-slider" type="range" min="100" max="1000" step="10" value="300" />
            </div>
            <div id="chunk-row" class="slider-row">
                <label for="chunk-slider">Palavras por vez: <span id="chunk-value">1</span></label>
                <input id="chunk-slider" type="range" min="1" max="4" step="1" value="1" />
            </div>
            <div id="tts-settings" class="tts-settings" hidden>
                <div class="slider-row tts-voice-row">
                    <label for="tts-voice">Voz do narrador</label>
                    <select id="tts-voice" aria-describedby="tts-status">
                        <option value="pf_dora" lang="pt-BR">Dora — Português (Brasil) · voz feminina</option>
                    </select>
                </div>
                <div class="slider-row">
                    <label for="tts-rate-slider">
                        Velocidade do áudio: <span id="tts-rate-value">1.0x</span>
                        <span class="tts-wpm-badge">≈ <span id="tts-effective-wpm">—</span> WPM</span>
                    </label>
                    <input id="tts-rate-slider" type="range" min="0.5" max="4" step="0.1" value="1.0" />
                </div>
                <div class="slider-row">
                    <label for="tts-buffer-slider">Buffer antecipado: <span id="tts-buffer-value">60s</span></label>
                    <input id="tts-buffer-slider" type="range" min="30" max="120" step="15" value="60" />
                    <span id="tts-buffer-status" class="tts-buffer-status">Preparado sob demanda</span>
                </div>
            </div>
            <div class="slider-row">
                <label for="font-slider">Tamanho da fonte: <span id="font-value">48</span>px</label>
                <input id="font-slider" type="range" min="24" max="96" step="2" value="48" />
            </div>
            <div id="orp-row" class="slider-row toggle-row">
                <label for="orp-toggle">Destaque ORP (letra-âncora)</label>
                <button id="orp-toggle" class="icon-btn" title="Ativar/desativar ORP">Desligado</button>
            </div>
            <div id="nav-snap-back-row" class="slider-row toggle-row" hidden>
                <label for="nav-snap-back-toggle">Voltar ao Foco ao clicar numa palavra</label>
                <button id="nav-snap-back-toggle" class="icon-btn" title="Ao clicar numa palavra no Fluxo, volta pro Foco">Desligado</button>
            </div>
            <div class="slider-row toggle-row">
                <label for="nav-pause-switch-toggle">Pausar ao trocar de modo</label>
                <button id="nav-pause-switch-toggle" class="icon-btn" title="Pausar a leitura automaticamente ao trocar entre Foco e Fluxo">Desligado</button>
            </div>
        </div>
    </div>
</main>

<script type="module" src="/static/js/app.js"></script>
</body>
</html>
